name: Warden Release Security Scan

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      strict_mode:
        description: 'Run in strict mode (fail on any issue)'
        required: false
        default: 'true'

jobs:
  warden:
    name: Release Security Audit
    runs-on: ubuntu-latest

    env:
      WARDEN_LLM_PROVIDER: ollama
      WARDEN_BLOCKED_PROVIDERS: "claude_code,codex"
      OLLAMA_HOST: http://localhost:11434

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Warden (local)
        # Audit the release code itself, not the previously published package.
        run: |
          pip install --upgrade pip
          pip install ".[semantic]"

      - name: Cache Ollama binary
        id: ollama-binary-cache
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/ollama
          key: ollama-binary-${{ runner.os }}-0.17.4

      - name: Cache AI Models
        uses: actions/cache@v5
        with:
          path: ~/.ollama
          key: ollama-models-${{ runner.os }}-qwen2.5-coder-3b
          restore-keys: |
            ollama-models-${{ runner.os }}-

      - name: Install Ollama binary
        if: steps.ollama-binary-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | OLLAMA_VERSION=0.17.4 sh
          sudo systemctl stop ollama || true
          sudo systemctl disable ollama || true

      - name: Start Ollama and warm up model
        env:
          OLLAMA_MAX_LOADED_MODELS: "1"
          OLLAMA_FLASH_ATTENTION: "1"
          OLLAMA_CONTEXT_LENGTH: "4096"
        run: |
          lsof -ti :11434 | xargs --no-run-if-empty sudo kill -9 || true
          ollama serve &
          for i in {1..30}; do curl -s http://localhost:11434/api/tags > /dev/null && break || sleep 1; done
          if ollama list | grep -q "qwen2.5-coder:3b"; then
            echo "Model already cached."
          else
            ollama pull qwen2.5-coder:3b
          fi
          curl -s http://localhost:11434/api/generate \
            -d '{"model":"qwen2.5-coder:3b","prompt":"hi","options":{"num_predict":1},"keep_alive":-1}' \
            -o /dev/null
          echo "Ollama ready."

      - name: Run Strict Security Audit
        run: |
          mkdir -p .warden/reports
          warden scan src/warden --level standard --format sarif --output .warden/reports/warden-report.sarif

      - name: Check Technical Debt
        run: |
          echo "## Technical Debt Report" >> $GITHUB_STEP_SUMMARY
          warden baseline debt >> $GITHUB_STEP_SUMMARY 2>&1 || true

      - name: Upload SARIF Report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .warden/reports/warden-report.sarif
        continue-on-error: true

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warden-release-reports
          path: .warden/reports/

      - name: Create Security Summary
        if: always()
        run: |
          echo "## Warden Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f .warden/ai_status.md ]; then
            cat .warden/ai_status.md >> $GITHUB_STEP_SUMMARY
          fi
