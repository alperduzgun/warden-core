name: Warden PR Security Scan

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  warden:
    name: PR Security Scan
    runs-on: ubuntu-latest

    env:
      WARDEN_LLM_PROVIDER: ollama
      WARDEN_BLOCKED_PROVIDERS: "claude_code,codex"
      OLLAMA_HOST: http://localhost:11434

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for diff

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Warden (local)
        # Scan with the current PR code, not the published PyPI package.
        run: |
          pip install --upgrade pip
          pip install ".[semantic]"
          warden --help

      - name: Cache Ollama binary
        id: ollama-binary-cache
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/ollama
          key: ollama-binary-${{ runner.os }}-0.17.4

      - name: Cache AI Models
        uses: actions/cache@v5
        with:
          path: ~/.ollama
          key: ollama-models-${{ runner.os }}-qwen2.5-coder-3b
          restore-keys: |
            ollama-models-${{ runner.os }}-

      - name: Install Ollama binary
        if: steps.ollama-binary-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | OLLAMA_VERSION=0.17.4 sh
          sudo systemctl stop ollama || true
          sudo systemctl disable ollama || true

      - name: Start Ollama and warm up model
        env:
          OLLAMA_MAX_LOADED_MODELS: "1"
          OLLAMA_FLASH_ATTENTION: "1"
          OLLAMA_CONTEXT_LENGTH: "4096"
        run: |
          lsof -ti :11434 | xargs --no-run-if-empty sudo kill -9 || true
          ollama serve &
          for i in {1..30}; do curl -s http://localhost:11434/api/tags > /dev/null && break || sleep 1; done
          if ollama list | grep -q "qwen2.5-coder:3b"; then
            echo "Model already cached."
          else
            ollama pull qwen2.5-coder:3b
          fi
          # Warm up: fully initialise LLAMA.CPP thread pools and KV cache.
          curl -s http://localhost:11434/api/generate \
            -d '{"model":"qwen2.5-coder:3b","prompt":"hi","options":{"num_predict":1},"keep_alive":-1}' \
            -o /dev/null
          echo "Ollama ready."

      - name: Run Warden PR Scan
        run: |
          mkdir -p .warden/reports
          # Scan only changed files relative to base branch
          CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}"...HEAD | grep "\.py$" || true)
          if [ -z "$CHANGED" ]; then
            echo "No Python files changed. Skipping scan."
            exit 0
          fi
          warden scan $CHANGED --level standard --ci --format sarif --output .warden/reports/warden-report.sarif

      - name: Upload SARIF Report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .warden/reports/warden-report.sarif
        continue-on-error: true

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: warden-pr-reports
          path: .warden/reports/
